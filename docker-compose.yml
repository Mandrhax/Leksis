services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    container_name: leksis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leksis
      POSTGRES_USER: leksis_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Persistent data — survives container restarts and updates
      - postgres_data:/var/lib/postgresql/data
      # Schema init — executed only once on first start (empty volume)
      - ./docker/init-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leksis_user -d leksis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - leksis-net

  # ── Ollama (LLM inference, GPU-accelerated) ─────────────────
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: leksis-ollama
    restart: unless-stopped
    volumes:
      # Persistent model storage — models survive updates
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_SCHED_SPREAD: ${OLLAMA_SCHED_SPREAD:-false}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-3}
    ports:
      # Expose on host for direct access / model management
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - leksis-net

  # ── Leksis Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leksis-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # Database — resolved via internal Docker network
      DATABASE_URL: postgresql://leksis_user:${POSTGRES_PASSWORD}@postgres:5432/leksis

      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

      # Encryption key (AES-256-GCM, 64 hex chars)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Ollama — resolved via internal Docker network
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL}
      OLLAMA_REWRITE_MODEL: ${OLLAMA_REWRITE_MODEL}
      # Upload directory for logo and background images (outside /app/ to avoid permission issues)
      UPLOAD_DIR: /data/uploads
    volumes:
      # Persistent uploads (logo, background) — survives container restarts and updates
      - leksis_uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - leksis-net

  # ── Caddy Reverse Proxy ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: leksis-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      CADDY_HOST: ${CADDY_HOST}
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - leksis-net

# ── Networks ────────────────────────────────────────────────
networks:
  leksis-net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
  ollama_data:
  leksis_uploads:
  caddy_data:
