# ============================================================
# NVIDIA GPU overlay for Ollama
#
# Requires: nvidia-container-toolkit installed and configured.
# Selected automatically by install.sh when an NVIDIA GPU is detected.
#
# Manual usage:
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d
# ============================================================
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
